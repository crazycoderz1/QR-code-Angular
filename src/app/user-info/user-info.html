<div class=" d-flex justify-content-center m-2">
  <div class="d-flex gap-1 mx-sm-3 mb-2">
    <input type="text"  name="pasted_url"
      [(ngModel)]="pastedUrl" class="form-control" id="inputUrl" placeholder="Paste here..." style=" min-width: 10rem;max-width: 20rem;">
  </div>
  <button type="submit" class="btn btn-primary mb-2" (click)="downloadQRcodeFun()">Download QR code</button>
</div>


<div class="d-flex justify-content-center">
  <div class="flex-column">
     <qrcode
      [qrdata]="qrData"
      [width]="250"
      [errorCorrectionLevel]="'M'">
    </qrcode>
    <p class="text-primary text-center"> {{qrData}}</p>
  </div>
</div>
